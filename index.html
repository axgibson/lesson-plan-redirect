<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camp Creek Lesson Plan Portal</title>
  <link rel="icon" type="image/png" href="Shield.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="portal-card" aria-labelledby="pageTitle">
      <div class="brand-row">
        <img src="Inverted-Shield.png" alt="Camp Creek Middle School logo" class="logo" />
        <div class="brand-text">
          <p class="eyebrow" id="schoolName">Camp Creek Middle School</p>
          <h1 id="pageTitle">Lesson Plan Portal</h1>
          <p class="year-pill" id="schoolYear">2026-2027</p>
        </div>
      </div>

      <p class="intro-text">
        Search for your name, confirm your department folder, then open your lesson plan folder.
      </p>

      <div id="statusMessage" class="status-message" role="status" aria-live="polite">
        Loading teacher list...
      </div>

      <form id="portalForm" class="selector-panel">
        <label for="departmentFilter">Filter by department</label>
        <select id="departmentFilter" disabled>
          <option value="all" selected>All departments</option>
        </select>

        <label for="teacherSearch">Search by name or email</label>
        <input
          id="teacherSearch"
          class="teacher-search"
          type="search"
          placeholder="Start typing your last name..."
          autocomplete="off"
          disabled
        />

        <label for="userSelect">Teacher name</label>
        <select id="userSelect" disabled>
          <option value="" selected>-- Select Your Name --</option>
        </select>

        <button id="goButton" class="primary-button" type="submit" disabled>
          Open Lesson Plan Folder
        </button>
      </form>

      <div id="selectedTeacher" class="selected-teacher" hidden></div>

      <div class="folder-grid" id="folderGrid" aria-label="Available lesson plan folders"></div>

      <div class="support-box">
        <p>Don&rsquo;t see your name or need your folder link updated?</p>
        <a id="supportLink" href="mailto:gibsona4@fultonschools.org?subject=Lesson%20Plan%20Portal%20Support" class="support-link">
          Email Mr. Gibson
        </a>
      </div>
    </section>
  </main>

  <script>
    const teacherSearch = document.getElementById('teacherSearch');
    const departmentFilter = document.getElementById('departmentFilter');
    const userSelect = document.getElementById('userSelect');
    const goButton = document.getElementById('goButton');
    const portalForm = document.getElementById('portalForm');
    const statusMessage = document.getElementById('statusMessage');
    const selectedTeacher = document.getElementById('selectedTeacher');
    const folderGrid = document.getElementById('folderGrid');
    const schoolName = document.getElementById('schoolName');
    const schoolYear = document.getElementById('schoolYear');
    const pageTitle = document.getElementById('pageTitle');
    const supportLink = document.getElementById('supportLink');

    let portalData = {
      folders: [],
      teachers: [],
      admin: []
    };

    let teachers = [];
    let folderLookup = new Map();

    function normalize(value) {
      return String(value || '').toLowerCase().trim();
    }

    function getEmailDisplay(email) {
      if (Array.isArray(email)) {
        return email.join(', ');
      }

      return email || 'Email not listed';
    }

    function updateStatus(message, type = 'info') {
      statusMessage.textContent = message;
      statusMessage.className = `status-message ${type}`;
    }

    function getFolder(folderId) {
      return folderLookup.get(folderId) || {
        id: folderId,
        label: 'Folder not listed',
        url: ''
      };
    }

    function clearOptions() {
      userSelect.innerHTML = '<option value="" selected>-- Select Your Name --</option>';
    }

    function renderDepartmentFilter() {
      departmentFilter.innerHTML = '<option value="all" selected>All departments</option>';

      portalData.folders
        .filter((folder) => folder.id !== 'admin')
        .forEach((folder) => {
          const option = document.createElement('option');
          option.value = folder.id;
          option.textContent = folder.label;
          departmentFilter.appendChild(option);
        });

      departmentFilter.disabled = portalData.folders.length === 0;
    }

    function renderFolderGrid() {
      folderGrid.innerHTML = '';

      portalData.folders
        .filter((folder) => folder.id !== 'admin')
        .forEach((folder) => {
          const count = teachers.filter((teacher) => teacher.folderId === folder.id).length;
          const card = document.createElement('div');
          card.className = 'folder-card';
          card.innerHTML = `
            <strong>${folder.label}</strong>
            <span>${count} ${count === 1 ? 'teacher' : 'teachers'}</span>
          `;
          folderGrid.appendChild(card);
        });
    }

    function renderTeacherOptions(list) {
      clearOptions();

      list.forEach((teacher) => {
        const folder = getFolder(teacher.folderId);
        const option = document.createElement('option');
        option.value = folder.url;
        option.textContent = `${teacher.name} — ${folder.label}`;
        option.dataset.name = teacher.name;
        option.dataset.email = getEmailDisplay(teacher.email);
        option.dataset.folderLabel = folder.label;
        option.dataset.folderId = folder.id;
        userSelect.appendChild(option);
      });

      userSelect.disabled = list.length === 0;
      goButton.disabled = true;
      selectedTeacher.hidden = true;

      if (teachers.length > 0) {
        teacherSearch.disabled = false;
        departmentFilter.disabled = false;
      }
    }

    function getFilteredTeachers() {
      const searchTerm = normalize(teacherSearch.value);
      const selectedDepartment = departmentFilter.value;

      return teachers.filter((teacher) => {
        const folder = getFolder(teacher.folderId);
        const name = normalize(teacher.name);
        const email = normalize(getEmailDisplay(teacher.email));
        const folderLabel = normalize(folder.label);
        const matchesDepartment = selectedDepartment === 'all' || teacher.folderId === selectedDepartment;
        const matchesSearch = !searchTerm || name.includes(searchTerm) || email.includes(searchTerm) || folderLabel.includes(searchTerm);
        return matchesDepartment && matchesSearch;
      });
    }

    function updateTeacherList() {
      const filteredTeachers = getFilteredTeachers();
      renderTeacherOptions(filteredTeachers);

      const searchTerm = normalize(teacherSearch.value);
      const selectedDepartment = departmentFilter.value;
      const departmentLabel = selectedDepartment === 'all'
        ? 'all departments'
        : getFolder(selectedDepartment).label;

      if ((searchTerm || selectedDepartment !== 'all') && filteredTeachers.length === 0) {
        updateStatus('No matching names found. Check spelling or email Mr. Gibson for support.', 'warning');
      } else {
        updateStatus(`${filteredTeachers.length} name${filteredTeachers.length === 1 ? '' : 's'} available in ${departmentLabel}.`, 'success');
      }
    }

    function handleSelectionChange() {
      const selectedOption = userSelect.options[userSelect.selectedIndex];
      const hasSelection = Boolean(userSelect.value);

      goButton.disabled = !hasSelection;

      if (hasSelection) {
        selectedTeacher.hidden = false;
        selectedTeacher.innerHTML = `
          <strong>Selected:</strong> ${selectedOption.dataset.name}<br>
          <span>${selectedOption.dataset.folderLabel} folder &bull; ${selectedOption.dataset.email}</span>
        `;
      } else {
        selectedTeacher.hidden = true;
        selectedTeacher.textContent = '';
      }
    }

    function hydrateLegacyData(data) {
      // Supports the older Phase 1 array format if this file is reused with an old teachers.json.
      const folderMap = new Map();
      const folderIds = new Map();
      const legacyTeachers = [];
      const legacyAdmin = [];

      data.forEach((teacher) => {
        const isAdmin = teacher.name === '-- ADMIN --';
        const decodedFolder = decodeURIComponent(teacher.folder || '');
        const match = decodedFolder.match(/Lesson Plans\/([^?]+)/);
        const label = isAdmin ? 'ADMIN' : match ? match[1] : 'General';
        const id = label.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'general';

        if (!folderMap.has(id)) {
          folderMap.set(id, { id, label, url: teacher.folder });
        }

        folderIds.set(teacher.folder, id);

        const normalizedTeacher = {
          name: teacher.name,
          email: teacher.email,
          folderId: id
        };

        if (isAdmin) {
          legacyAdmin.push(normalizedTeacher);
        } else {
          legacyTeachers.push(normalizedTeacher);
        }
      });

      return {
        schoolName: 'Camp Creek Middle School',
        portalTitle: 'Lesson Plan Portal',
        schoolYear: '2026-2027',
        supportEmail: 'gibsona4@fultonschools.org',
        folders: Array.from(folderMap.values()),
        teachers: legacyTeachers,
        admin: legacyAdmin
      };
    }

    portalForm.addEventListener('submit', (event) => {
      event.preventDefault();

      const folderUrl = userSelect.value;

      if (!folderUrl) {
        updateStatus('Please select your name before continuing.', 'warning');
        return;
      }

      window.location.href = folderUrl;
    });

    teacherSearch.addEventListener('input', updateTeacherList);
    departmentFilter.addEventListener('change', updateTeacherList);
    userSelect.addEventListener('change', handleSelectionChange);

    fetch('teachers.json', { cache: 'no-store' })
      .then((response) => {
        if (!response.ok) {
          throw new Error('Teacher list could not be loaded.');
        }

        return response.json();
      })
      .then((data) => {
        portalData = Array.isArray(data) ? hydrateLegacyData(data) : data;
        folderLookup = new Map(portalData.folders.map((folder) => [folder.id, folder]));
        teachers = [...(portalData.teachers || []), ...(portalData.admin || [])]
          .filter((teacher) => teacher.name && teacher.folderId && getFolder(teacher.folderId).url)
          .sort((a, b) => a.name.localeCompare(b.name));

        schoolName.textContent = portalData.schoolName || 'Camp Creek Middle School';
        pageTitle.textContent = portalData.portalTitle || 'Lesson Plan Portal';
        schoolYear.textContent = portalData.schoolYear || '';

        if (portalData.supportEmail) {
          supportLink.href = `mailto:${portalData.supportEmail}?subject=Lesson%20Plan%20Portal%20Support`;
        }

        renderDepartmentFilter();
        renderFolderGrid();
        renderTeacherOptions(teachers);
        updateStatus(`${teachers.length} names loaded across ${portalData.folders.length} folders.`, 'success');
      })
      .catch((error) => {
        console.error(error);
        updateStatus('The teacher list could not be loaded. Please email Mr. Gibson for support.', 'error');
        teacherSearch.disabled = true;
        departmentFilter.disabled = true;
        userSelect.disabled = true;
        goButton.disabled = true;
      });
  </script>
</body>
</html>
